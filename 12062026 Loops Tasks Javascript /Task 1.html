<!DOCTYPE html>
<html lang="en">
<head>
    <title>Task 1: 100 Natural Numbers</title>
</head>
<body>
    <h2>First 100 Natural Numbers:</h2>
    <div id="output"></div>

    <script>

        let result = "";
        for (let i = 1; i <= 100; i++) 
        {
            result += i + " ";
        }
        document.getElementById("output").innerText = result;
    </script>
</body>
</html>
