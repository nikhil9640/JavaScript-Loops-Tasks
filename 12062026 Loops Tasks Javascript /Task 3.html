<!DOCTYPE html>
<html lang="en">
<head>
    <title>Task 3: Even Numbers between 293 and 569</title>
</head>
<body>
    <h2>Even Numbers between 293 and 569:</h2>
    <div id="output"></div>

    <script>
        let result = " ";
        for (let i = 293; i <= 569; i++) 
        {
            if (i % 2 === 0) 
            {
                result += i + " ";
            }
        }
        document.getElementById("output").innerText = result;
    </script>
</body>
</html>
