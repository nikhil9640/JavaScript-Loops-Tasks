<!DOCTYPE html>
<html lang="en">
<head>
    <title>Task 2: 100 Whole Numbers</title>
</head>
<body>
    <h2>First 100 Whole Numbers:</h2>
    <div id="output"></div>

    <script>
        let result = " ";
        for (let i = 0; i < 100; i++) 
        {
            
            result += i + " ";
        }
        document.getElementById("output").innerText = result;
    </script>
</body>
</html>
