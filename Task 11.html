<!DOCTYPE html>
<html lang="en">
<head>
    <title>Task 11: Sum of Even Position Digits</title>
</head>
<body>
    <h2>Sum of Digits at Even Positions (Right to Left)</h2>
    <input type="number" id="numN11" placeholder="Enter a number">
    <button onclick="sumEvenPositions()">Calculate</button>
    <p id="result11"></p>

    <script>
        function sumEvenPositions() {
            let numStr = document.getElementById('numN11').value;
            let sum = 0;
            
            // Reversing the loop sequence allows counting positions from right to left smoothly.
            let position = 1; 
            for (let i = numStr.length - 1; i >= 0; i--) {
                if (position % 2 === 0) {
                    sum += parseInt(numStr[i]);
                }
                position++;
            }
            document.getElementById('result11').innerText = "Sum of digits at even positions: " + sum;
        }
    </script>
</body>
</html>
