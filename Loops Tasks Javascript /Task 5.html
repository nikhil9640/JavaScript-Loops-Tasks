<!DOCTYPE html>
<html lang="en">
<head>
    <title>Task 5: 100 Natural Numbers in Reverse</title>
</head>
<body>
    <h2>100 Natural Numbers in Reverse:</h2>
    <div id="output"></div>

    <script>
        let result = " ";
        for (let i = 100; i >= 1; i--) 
        {
            result += i + " ";
        }
        document.getElementById("output").innerText = result;
    </script>
</body>
</html>
