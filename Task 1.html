<!DOCTYPE html>
<html lang="en">
<head>
    <title>Task 1: Print Even Numbers</title>
</head>
<body>
    <h2>Print Even Numbers from 1 to N</h2>
    <input type="number" id="numN1" placeholder="Enter N">
    <button onclick="printEvenNumbers()">Print</button>
    <p id="result1"></p>

    <script>
        function printEvenNumbers() {
            let n = parseInt(document.getElementById('numN1').value);
            let result = [];
            
            for (let i = 1; i <= n; i++) {
                if (i % 2 === 0) {
                    result.push(i);
                }
            }
            document.getElementById('result1').innerText = "Even numbers: " + result.join(', ');
        }
    </script>
</body>
</html>
